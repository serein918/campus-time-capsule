server:
  port: ${PORT:8080}

spring:
  application:
    name: capsule-server

    datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 使用环境变量 SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
    # 如果环境变量不存在，则回退到本地默认值
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/capsule_db?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.capsule.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# Knife4j接口文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
